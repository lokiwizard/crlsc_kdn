data:
  root: D:\pyproject\crlsc_kdn\datasets\afhq\train
  max_samples: 1000
  subset_seed: 42
  image_size: 224

model:
  name: resnet34
  pretrained: true
  projection_hidden_dim: 2048
  projection_out_dim: 128

train:
  epochs: 20
  batch_size: 64
  num_workers: 0
  temperature: 0.2

optimizer:
  lr: 0.001
  weight_decay: 0.0001

runtime:
  device: auto
  amp: true
  seed: 42

output:
  dir: stageB/afhq_ssl
  checkpoint_interval: 5
